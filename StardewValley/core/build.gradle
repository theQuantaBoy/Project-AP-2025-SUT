plugins {
  id 'java-library'
}

group = 'com.stardew'
version = '1.0'

java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(21)
  }
}

tasks.withType(JavaCompile).configureEach {
  options.release = 21
  options.encoding = 'UTF-8'

  options.compilerArgs += [
    '-Xlint:unchecked',
    '-Xlint:deprecation'    // optional: catch deprecated API uses
  ]

}

repositories {
  mavenCentral()
}

dependencies {
  // LibGDX core
  api "com.badlogicgames.gdx:gdx:$gdxVersion"
  implementation "com.badlogicgames.gdx:gdx-backend-headless:$gdxVersion"

  // Optional: Graal Native helper
  if (project.hasProperty('enableGraalNative') && enableGraalNative == 'true') {
    implementation "io.github.berstanio:gdx-svmhelper-annotations:$graalHelperVersion"
  }

  // JSON libraries
  implementation 'com.fasterxml.jackson.core:jackson-databind:2.15.2'
  implementation 'com.fasterxml.jackson.core:jackson-core:2.15.2'
  implementation 'com.fasterxml.jackson.core:jackson-annotations:2.15.2'
  implementation 'com.google.code.gson:gson:2.8.9'

  // Testing
  testImplementation 'org.junit.jupiter:junit-jupiter:5.9.3'
  testImplementation 'org.mockito:mockito-core:5.11.0'

  implementation "com.badlogicgames.gdx:gdx-freetype:$gdxVersion"

  implementation "com.badlogicgames.gdx:gdx:1.12.0"
  implementation "com.badlogicgames.gdx:gdx-platform:1.12.0:natives-desktop"
  implementation "com.badlogicgames.gdx:gdx-tools:1.12.0"

  implementation "com.esotericsoftware:kryonet:2.22.0-RC1"
}

test {
  useJUnitPlatform()
}

sourceSets.main.resources.srcDirs = ["assets"]
